name: HealBot CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test-and-heal:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Run tests and capture output
        id: run_tests
        run: |
          npm test 2>&1 | tee test-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Determine test status
        id: status
        run: |
          if grep -q "All tests passed" test-output.txt; then
            echo "result=success" >> $GITHUB_OUTPUT
          else
            echo "result=failure" >> $GITHUB_OUTPUT
          fi

      - name: Send to HealBot n8n webhook
        if: always()
        env:
          HEALBOT_WEBHOOK_URL: ${{ secrets.HEALBOT_WEBHOOK_URL }}
        run: |
          LOG=$(cat test-output.txt)
          COMMIT_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          BRANCH="${{ github.ref_name }}"
          ACTOR="${{ github.actor }}"
          REPO="${{ github.repository }}"
          STATUS="${{ steps.status.outputs.result }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Build JSON payload safely using jq
          jq -n \
            --arg status "$STATUS" \
            --arg log "$LOG" \
            --arg commit "$COMMIT_SHORT" \
            --arg branch "$BRANCH" \
            --arg actor "$ACTOR" \
            --arg repo "$REPO" \
            --arg timestamp "$TIMESTAMP" \
            '{
              status: $status,
              error_log: $log,
              commit: $commit,
              branch: $branch,
              actor: $actor,
              repo: $repo,
              timestamp: $timestamp
            }' | curl -s -X POST "$HEALBOT_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d @-

          echo "✅ Payload sent to HealBot webhook"

      - name: Fail job if tests failed
        if: steps.status.outputs.result == 'failure'
        run: |
          echo "❌ Tests failed — HealBot AI has been notified to diagnose and fix."
          exit 1
